<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>کافی کلیکر · Gist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Vazirmatn','Segoe UI',sans-serif; }
    body { min-height:100vh; background:radial-gradient(ellipse 900px 500px at 50% -10%, #3a2717 0%, transparent 60%), #1c130d; display:flex; justify-content:center; align-items:center; padding:32px 16px; }
    .game-container { max-width:560px; width:100%; background:linear-gradient(180deg,#2c2015,#382a1a); border:1px solid #4a382490; border-radius:18px; padding:28px; box-shadow:0 20px 40px -20px #00000090, inset 0 1px 0 #ffffff08; }
    h1 { text-align:center; color:#e8b45c; font-weight:900; font-size:2.2rem; display:flex; align-items:center; justify-content:center; gap:10px; }
    h1::before { content:"☕"; font-size:2rem; }
    .tabs { display:flex; gap:6px; background:#241a12; padding:4px; border-radius:12px; margin:20px 0 16px; }
    .tab { flex:1; text-align:center; padding:10px 0; border-radius:9px; cursor:pointer; font-weight:700; font-size:14px; color:#c2ac8c; transition:all .2s; user-select:none; }
    .tab.active { background:#d98e4a; color:#241505; }
    label { display:block; font-size:13px; color:#c2ac8c; margin:14px 0 6px; font-weight:500; }
    input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #4a382490; background:#241a12; color:#f3e7d3; font-size:15px; outline:none; transition:border-color .2s; }
    input:focus { border-color:#d98e4a; }
    button.primary { width:100%; margin-top:20px; padding:13px; border:none; border-radius:10px; background:linear-gradient(180deg,#e8b45c,#d98e4a); color:#241505; font-weight:800; font-size:15px; cursor:pointer; transition:transform .1s; }
    button.primary:active { transform:scale(.98); }
    .btn-secondary { width:100%; margin-top:10px; padding:12px; border-radius:10px; border:1px solid #4a382490; background:transparent; color:#c2ac8c; font-weight:700; font-size:14px; cursor:pointer; transition:all .15s; }
    .btn-secondary:hover { border-color:#d98e4a; color:#e8b45c; }
    .error { margin-top:12px; background:#3a1f18; border:1px solid #d17a5e; color:#f0c4b4; padding:10px 12px; border-radius:8px; font-size:13px; display:none; }
    .error.show { display:block; }
    .hidden { display:none !important; }
    .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:8px; }
    .welcome { font-weight:800; font-size:17px; }
    .welcome span { color:#e8b45c; }
    .logout { background:none; border:1px solid #4a382490; color:#c2ac8c; padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
    .logout:hover { border-color:#d98e4a; color:#e8b45c; }
    .admin-trigger { background:none; border:1px solid #4a382490; color:#c2ac8c; padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
    .admin-trigger:hover { border-color:#e8b45c; color:#e8b45c; }
    .stats { background:#241a12; padding:18px 12px; border-radius:12px; margin:20px 0; display:flex; flex-wrap:wrap; justify-content:space-around; align-items:center; color:#f3e7d3; font-weight:bold; border:1px solid #4a382490; }
    .stats span { background:#1c130d; padding:6px 18px; border-radius:8px; font-size:1.2rem; min-width:70px; text-align:center; color:#e8b45c; }
    .cup-zone { position:relative; height:190px; display:flex; align-items:flex-end; justify-content:center; }
    .steam { position:absolute; bottom:118px; left:50%; transform:translateX(-50%); pointer-events:none; z-index:1; }
    .steam path { stroke:#c2ac8c; stroke-width:3; fill:none; stroke-linecap:round; opacity:0; }
    .steam .s1 { animation:steam 2.6s ease-in infinite; }
    .steam .s2 { animation:steam 2.6s ease-in infinite .9s; }
    .steam .s3 { animation:steam 2.6s ease-in infinite 1.8s; }
    @keyframes steam { 0%{opacity:0;transform:translateY(0) scaleX(1);} 30%{opacity:.55;} 100%{opacity:0;transform:translateY(-34px) scaleX(1.5);} }
    .coffee-btn { background:none; border:none; cursor:pointer; padding:0; width:150px; height:150px; position:relative; z-index:2; transition:transform .08s; outline:none; }
    .coffee-btn:active { transform:scale(.9) rotate(-2deg); }
    .coffee-btn:focus-visible { outline:2px solid #e8b45c; outline-offset:6px; border-radius:50%; }
    .coffee-btn.disabled { opacity:0.5; filter:grayscale(0.6); transform:scale(0.95); pointer-events:none; }
    .cooldown-text { font-size:.9rem; background:#241a12; padding:2px 18px; border-radius:60px; color:#c2ac8c; display:inline-block; }
    .abilities { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:25px 0 18px; }
    .ability-card { background:#2c2015; padding:12px 14px; border-radius:12px; flex:1 1 130px; text-align:center; border:1px solid #4a382490; color:#f3e7d3; font-weight:700; }
    .ability-card button { background:linear-gradient(180deg,#e8b45c,#d98e4a); border:none; padding:8px 18px; border-radius:8px; font-weight:800; margin-top:8px; cursor:pointer; transition:.05s linear; font-size:.9rem; width:100%; color:#241505; box-shadow:0 3px 0 #a06f3a; }
    .ability-card button:active { transform:translateY(3px); box-shadow:0 0 0 #a06f3a; }
    .ability-card button:disabled { opacity:.5; transform:translateY(3px); box-shadow:0 0 0 #a06f3a; pointer-events:none; }
    .leaderboard { background:#241a12; padding:14px 10px; border-radius:12px; margin:20px 0 5px; border:1px solid #4a382490; }
    .leaderboard h3 { text-align:center; margin-bottom:10px; color:#e8b45c; letter-spacing:1px; }
    .lb-list { max-height:180px; overflow-y:auto; padding:0 4px; display:flex; flex-direction:column; gap:3px; }
    .lb-item { display:flex; justify-content:space-between; background:#1c130d; padding:4px 18px; border-radius:8px; font-size:.9rem; border-right:4px solid #d98e4a; }
    .lb-item span:first-child { font-weight:600; color:#e8b45c; }
    .lb-item.me { border-right-color:#e8b45c; background:#2c1f14; }
    .lb-item.me span:first-child { color:#f3e7d3; }
    .my-rank { text-align:center; margin-top:10px; padding:6px 12px; background:#1c130d; border-radius:8px; font-size:13px; color:#c2ac8c; border:1px dashed #4a382490; }
    .my-rank strong { color:#e8b45c; }
    .reset-area { text-align:center; margin-top:12px; }
    .reset-area button { background:#2c2015; border:1px solid #4a382490; padding:8px 32px; border-radius:8px; color:#c2ac8c; font-weight:bold; cursor:pointer; }
    .reset-area button:active { transform:scale(.96); }
    .footer { text-align:center; margin-top:8px; color:#c2ac8c; font-size:.8rem; }
    .footer a { color:#e8b45c; text-decoration:none; font-weight:700; }
    .footer a:hover { text-decoration:underline; }
    .server-badge { background:#3a2a15; border-radius:30px; padding:3px 16px; font-size:12px; color:#c2ac8c; display:inline-block; margin-bottom:8px; border:1px solid #4a382490; }
    .online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#6fbf73; margin-left:6px; }
    .guest-banner { background:#3a2a1580; border:1px dashed #d98e4a; border-radius:12px; padding:12px 14px; margin-bottom:16px; font-size:13px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .guest-banner button { background:#d98e4a; color:#241505; border:none; border-radius:8px; padding:8px 12px; font-size:12.5px; font-weight:800; cursor:pointer; white-space:nowrap; }
    .guest-banner.hidden { display:none; }
    .back-link { display:inline-block; margin-top:14px; font-size:12.5px; color:#c2ac8c; cursor:pointer; text-decoration:underline; background:none; border:none; }
    .back-link:hover { color:#e8b45c; }
    .admin-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0; background:#000000cc;
      display:flex; justify-content:center; align-items:center; z-index:1000;
      padding:20px;
    }
    .admin-panel {
      background:linear-gradient(180deg,#2c2015,#382a1a);
      border:1px solid #e8b45c;
      border-radius:18px;
      max-width:600px; width:100%;
      max-height:90vh;
      padding:28px;
      overflow-y:auto;
      box-shadow:0 20px 40px #000000;
    }
    .admin-panel h2 { color:#e8b45c; text-align:center; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
    .admin-panel h2 button { background:none; border:1px solid #4a382490; color:#c2ac8c; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
    .admin-panel h2 button:hover { border-color:#d17a5e; color:#d17a5e; }
    .admin-user-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #4a382440; flex-wrap:wrap; }
    .admin-user-row .uname { flex:1; min-width:80px; font-weight:600; color:#f3e7d3; }
    .admin-user-row input[type="number"] { width:72px; padding:6px 8px; border-radius:6px; border:1px solid #4a382490; background:#241a12; color:#f3e7d3; font-family:inherit; font-size:13px; }
    .admin-user-row button { border:none; border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; font-weight:700; }
    .btn-save { background:#93ab7d; color:#1a2214; }
    .btn-del { background:#d17a5e; color:#2a140c; }
    .admin-panel .empty { color:#c2ac8c; text-align:center; padding:20px 0; }
    .admin-panel .back-link { display:block; margin-top:16px; text-align:center; }
  </style>
</head>
<body>
<div class="game-container">
  <h1>کافی کلیکر</h1>
  <div style="text-align:center;"><span class="server-badge"><span class="online-dot"></span> Gist · آنلاین</span></div>

  <!-- ===== AUTH ===== -->
  <div id="auth-card">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">ورود</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">ثبت‌نام</div>
    </div>
    <form id="auth-form" onsubmit="handleAuthSubmit(event); return false;">
      <label for="username">نام کاربری</label>
      <input type="text" id="username" required maxlength="20">
      <label for="password">رمز عبور</label>
      <input type="password" id="password" required minlength="4">
      <button type="submit" class="primary" id="auth-submit-btn">ورود</button>
      <button type="button" class="btn-secondary" onclick="guestLogin()">ورود مهمان</button>
      <div class="error" id="auth-error"></div>
    </form>
  </div>

  <!-- ===== CONVERT GUEST ===== -->
  <div id="convert-card" class="hidden" style="margin-top:20px;">
    <label for="conv-username">نام کاربری</label>
    <input type="text" id="conv-username" maxlength="20">
    <label for="conv-password">رمز عبور</label>
    <input type="password" id="conv-password" minlength="4">
    <button type="button" class="primary" onclick="handleConvertSubmit()">ساخت حساب</button>
    <div class="error" id="conv-error"></div>
    <span class="back-link" onclick="hideConvert()">بی‌خیال</span>
  </div>

  <!-- ===== GAME ===== -->
  <div id="app" class="hidden">
    <div class="guest-banner hidden" id="guest-banner">
      <span>🕶️ مهمان – امتیاز ذخیره نمی‌شه</span>
      <button onclick="showConvert()">ساخت حساب</button>
    </div>
    <div class="top-row">
      <div class="welcome">سلام، <span id="me-name"></span> 👋</div>
      <div style="display:flex; gap:6px;">
        <button class="admin-trigger" onclick="openAdminPanel()">⚙️ مدیریت</button>
        <button class="logout" onclick="logout()">خروج</button>
      </div>
    </div>

    <div class="stats">
      <span id="coffeeDisplay">0</span> <span>☕</span>
      <span id="clickPowerDisplay">1</span> <span>⚡</span>
    </div>

    <div style="text-align:center;">
      <div class="cup-zone">
        <svg class="steam" width="60" height="60" viewBox="0 0 60 60">
          <path class="s1" d="M20 55 C15 45,25 40,20 30 C15 20,25 15,22 5"/>
          <path class="s2" d="M32 55 C27 45,37 40,32 30 C27 20,37 15,34 5"/>
          <path class="s3" d="M44 55 C39 45,49 40,44 30 C39 20,49 15,46 5"/>
        </svg>
        <button class="coffee-btn" id="coffeeBtn" aria-label="کلیک">
          <svg viewBox="0 0 150 150" width="150" height="150">
            <ellipse cx="75" cy="130" rx="55" ry="8" fill="#00000040"/>
            <path d="M30 55 h75 v40 a37.5 37.5 0 0 1-37.5 37.5h-0 A37.5 37.5 0 0 1 30 95 Z" fill="#e8b45c" stroke="#8a5a3a" stroke-width="3"/>
            <path id="liquid" d="M36 61 h63 v30 a31.5 31.5 0 0 1-31.5 31.5 A31.5 31.5 0 0 1 36 91 Z" fill="#5c3a20"/>
            <path d="M105 62 h8 a14 14 0 0 1 0 28 h-8" fill="none" stroke="#8a5a3a" stroke-width="6"/>
            <ellipse cx="67.5" cy="55" rx="37.5" ry="7" fill="#3a2717"/>
          </svg>
        </button>
      </div>
      <div><span class="cooldown-text" id="cooldownStatus">✅ آماده</span></div>
    </div>

    <div class="abilities">
      <div class="ability-card"><div>☕ +5 در ۵ ثانیه</div><button id="boostFiveSec">خرید (۱۵)</button></div>
      <div class="ability-card"><div>⚡ +۱ کلیک</div><button id="boostClickPower">خرید (۲۰)</button></div>
      <div class="ability-card"><div>⏱️ کاهش کول‌داون</div><button id="reduceCooldown">خرید (۳۰)</button></div>
    </div>

    <div class="leaderboard">
      <h3>🏆 لیدربورد</h3>
      <div class="lb-list" id="leaderboardList"><div class="lb-item" style="justify-content:center;">در حال دریافت...</div></div>
      <div class="my-rank hidden" id="myRank">رتبه شما: <strong id="rankNumber">-</strong> با <strong id="rankClicks">-</strong> امتیاز</div>
    </div>
    <div class="reset-area"><button id="resetGameBtn">🔄 ریست بازی (فقط خودت)</button></div>
    <div class="footer">
      ★ داده‌ها در GitHub Gist ذخیره می‌شوند<br>
      <a href="https://rubika.ir/@Coffee_Clicker" target="_blank">📱 کانال روبیکا: @Coffee_Clicker</a>
    </div>
  </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div id="adminOverlay" class="admin-overlay hidden" onclick="if(event.target===this) closeAdminPanel()">
  <div id="adminPanelContainer" class="admin-panel"></div>
</div>

<script>
  // ================================================================
  //  کافی کلیکر – فقط Gist (بدون localStorage)
  //  با افزایش قیمت توانایی‌ها بعد از هر خرید
  // ================================================================

  // ---------- ثابت‌های Gist ----------
  const GIST_ID = 'c9aed417aa0e3ba2da30bf582d0a56a6';
  const GIST_TOKEN = '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';

  const COOLDOWN_SEC = 0.3;
  const SAVE_INTERVAL = 3000; // هر ۳ ثانیه
  const ADMIN_PASSWORD = 'itsnotM.O.R';

  // قیمت‌های پایه
  const BASE_PRICE_BOOST = 15;
  const BASE_PRICE_CLICK = 20;
  const BASE_PRICE_COOLDOWN = 30;

  let gistReady = false;
  let currentUser = null;
  let isGuest = false;
  let mode = 'login';
  let lbPoll = null;
  let saveTimer = null;

  const gameState = {
    coffee: 0,
    clickPower: 1,
    cooldownMax: COOLDOWN_SEC,
    cooldownCurrent: 0,
    boostFiveSec: 0,
    fiveSecTimer: 0,
    lastTick: Date.now(),
    // قیمت‌های جاری هر توانایی
    priceBoost: BASE_PRICE_BOOST,
    priceClick: BASE_PRICE_CLICK,
    priceCooldown: BASE_PRICE_COOLDOWN,
  };

  // ---------- DOM refs ----------
  const authCard = document.getElementById('auth-card');
  const convertCard = document.getElementById('convert-card');
  const app = document.getElementById('app');
  const guestBanner = document.getElementById('guest-banner');
  const meName = document.getElementById('me-name');
  const scoreEl = document.getElementById('coffeeDisplay');
  const clickPowerEl = document.getElementById('clickPowerDisplay');
  const cooldownStatus = document.getElementById('cooldownStatus');
  const coffeeBtn = document.getElementById('coffeeBtn');
  const liquid = document.getElementById('liquid');
  const lbList = document.getElementById('leaderboardList');
  const myRankDiv = document.getElementById('myRank');
  const rankNumber = document.getElementById('rankNumber');
  const rankClicks = document.getElementById('rankClicks');

  const boostFiveBtn = document.getElementById('boostFiveSec');
  const boostClickBtn = document.getElementById('boostClickPower');
  const reduceCooldownBtn = document.getElementById('reduceCooldown');
  const resetBtn = document.getElementById('resetGameBtn');

  const adminOverlay = document.getElementById('adminOverlay');
  const adminPanelContainer = document.getElementById('adminPanelContainer');

  // ---------- توابع Gist ----------
  async function loadFromGist() {
    if (!gistReady) throw new Error('اتصال به Gist برقرار نیست');
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { Authorization: `token ${GIST_TOKEN}` }
    });
    if (!res.ok) throw new Error('خطا در بارگذاری Gist (کد ' + res.status + ')');
    const gist = await res.json();
    const content = gist.files['data.json'].content;
    return JSON.parse(content);
  }

  async function saveToGist(data) {
    if (!gistReady) throw new Error('اتصال به Gist برقرار نیست');
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        Authorization: `token ${GIST_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          'data.json': { content: JSON.stringify(data, null, 2) }
        }
      })
    });
    if (!res.ok) throw new Error('خطا در ذخیره‌سازی Gist (کد ' + res.status + ')');
    return true;
  }

  // ---------- دیتابیس (فقط در حافظه) ----------
  let db = { users: {} };

  async function loadDatabase() {
    if (!gistReady) throw new Error('Gist آماده نیست');
    db = await loadFromGist();
    if (!db.users) db.users = {};
    updateLeaderboard();
    if (currentUser && !isGuest && db.users[currentUser]) {
      const userData = db.users[currentUser];
      gameState.coffee = userData.clicks || 0;
      if (userData.boostCount !== undefined) gameState.boostFiveSec = userData.boostCount || 0;
      if (userData.clickPower) gameState.clickPower = userData.clickPower || 1;
      if (userData.cooldownMax) gameState.cooldownMax = userData.cooldownMax || COOLDOWN_SEC;
      gameState.priceBoost = userData.priceBoost || BASE_PRICE_BOOST;
      gameState.priceClick = userData.priceClick || BASE_PRICE_CLICK;
      gameState.priceCooldown = userData.priceCooldown || BASE_PRICE_COOLDOWN;
      updateUI();
    }
  }

  // Saves ONLY the current player's own progress. To avoid one player's
  // save wiping out another player's concurrent changes, it re-fetches the
  // freshest copy right before writing and merges just this user's fields
  // into it - it never blindly overwrites the whole file with a stale copy.
  async function saveDatabase() {
    if (isGuest || !currentUser) return;
    if (!gistReady) throw new Error('Gist آماده نیست');

    let fresh;
    try { fresh = await loadFromGist(); }
    catch (e) { fresh = db; }
    if (!fresh.users) fresh.users = {};
    const existingHash = (fresh.users[currentUser] && fresh.users[currentUser].hash)
      || (db.users[currentUser] && db.users[currentUser].hash) || '';
    if (!fresh.users[currentUser]) fresh.users[currentUser] = {};

    fresh.users[currentUser].hash = existingHash;
    fresh.users[currentUser].clicks = Math.floor(gameState.coffee);
    fresh.users[currentUser].boostCount = gameState.boostFiveSec;
    fresh.users[currentUser].clickPower = gameState.clickPower;
    fresh.users[currentUser].cooldownMax = gameState.cooldownMax;
    fresh.users[currentUser].priceBoost = gameState.priceBoost;
    fresh.users[currentUser].priceClick = gameState.priceClick;
    fresh.users[currentUser].priceCooldown = gameState.priceCooldown;

    db = fresh;
    await saveToGist(db);
    updateLeaderboard();
  }

  // ---------- تایمر ذخیره‌سازی خودکار ----------
  function startAutoSave() {
    if (saveTimer) clearInterval(saveTimer);
    saveTimer = setInterval(() => {
      saveDatabase().catch(e => console.error('Auto-save error:', e));
    }, SAVE_INTERVAL);
  }

  function stopAutoSave() {
    if (saveTimer) {
      clearInterval(saveTimer);
      saveTimer = null;
    }
  }

  // ---------- اتصال خودکار Gist ----------
  async function autoConnectGist() {
    try {
      const test = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: { Authorization: `token ${GIST_TOKEN}` }
      });
      if (!test.ok) throw new Error('اعتبارسنجی Gist ناموفق (کد ' + test.status + ')');
      gistReady = true;
      console.log('✅ Gist متصل شد');
      await loadDatabase();
    } catch (e) {
      console.error('❌ خطا در اتصال Gist:', e);
      gistReady = false;
      const errEl = document.getElementById('auth-error');
      errEl.textContent = '❌ اتصال به Gist برقرار نشد: ' + e.message;
      errEl.classList.add('show');
    }
  }

  // ---------- هش و احراز ----------
  async function sha256(text) {
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // ---------- لیدربورد ----------
  function updateLeaderboard() {
    if (!db || !db.users) {
      lbList.innerHTML = '<div class="lb-item" style="justify-content:center;">دیتابیس در دسترس نیست</div>';
      return;
    }
    const entries = Object.entries(db.users)
      .map(([name, data]) => ({ username: name, clicks: data.clicks || 0 }))
      .sort((a, b) => b.clicks - a.clicks)
      .slice(0, 10);

    lbList.innerHTML = '';
    if (entries.length === 0) {
      lbList.innerHTML = '<div class="lb-item" style="justify-content:center;">هنوز کسی ثبت‌نام نکرده</div>';
      return;
    }
    for (let item of entries) {
      const div = document.createElement('div');
      div.className = 'lb-item' + (item.username === currentUser ? ' me' : '');
      div.innerHTML = `<span>${item.username}</span><span>☕ ${item.clicks}</span>`;
      lbList.appendChild(div);
    }

    if (currentUser && !isGuest) {
      const all = Object.entries(db.users).map(([name, data]) => ({ username: name, clicks: data.clicks || 0 }));
      all.sort((a, b) => b.clicks - a.clicks);
      const idx = all.findIndex(u => u.username === currentUser);
      if (idx !== -1) {
        myRankDiv.classList.remove('hidden');
        rankNumber.textContent = (idx + 1) + ' از ' + all.length;
        rankClicks.textContent = all[idx].clicks;
      } else {
        myRankDiv.classList.add('hidden');
      }
    } else {
      myRankDiv.classList.add('hidden');
    }
  }

  // ---------- مایع و UI ----------
  function updateLiquid() {
    if (!liquid) return;
    const fill = (gameState.coffee % 50) / 50;
    const emptyY = 91, fullY = 61;
    const topY = emptyY - (emptyY - fullY) * Math.min(fill + 0.06, 1);
    liquid.setAttribute('d', `M36 ${topY.toFixed(1)} h63 v${(91 - topY).toFixed(1)} a31.5 31.5 0 0 1-31.5 31.5 A31.5 31.5 0 0 1 36 91 Z`);
  }

  function updateUI() {
    scoreEl.textContent = Math.floor(gameState.coffee);
    clickPowerEl.textContent = gameState.clickPower;
    if (gameState.cooldownCurrent > 0) {
      cooldownStatus.textContent = `⏳ ${Math.ceil(gameState.cooldownCurrent * 10) / 10} ثانیه`;
      coffeeBtn.classList.add('disabled');
    } else {
      cooldownStatus.textContent = '✅ آماده';
      coffeeBtn.classList.remove('disabled');
    }
    // نمایش قیمت‌های جاری روی دکمه‌ها
    boostFiveBtn.textContent = `خرید (${gameState.priceBoost})`;
    boostClickBtn.textContent = `خرید (${gameState.priceClick})`;
    reduceCooldownBtn.textContent = `خرید (${gameState.priceCooldown})`;
    // غیرفعال‌سازی اگر پول کافی نباشد
    boostFiveBtn.disabled = (gameState.coffee < gameState.priceBoost);
    boostClickBtn.disabled = (gameState.coffee < gameState.priceClick);
    reduceCooldownBtn.disabled = (gameState.coffee < gameState.priceCooldown || gameState.cooldownMax <= 0.05);
    updateLiquid();
  }

  // ---------- حلقه تیک ----------
  function gameTick() {
    const now = Date.now();
    const delta = (now - gameState.lastTick) / 1000;
    gameState.lastTick = now;
    if (gameState.cooldownCurrent > 0) {
      gameState.cooldownCurrent = Math.max(0, gameState.cooldownCurrent - delta);
    }
    if (gameState.boostFiveSec > 0) {
      gameState.fiveSecTimer += delta;
      while (gameState.fiveSecTimer >= 5) {
        gameState.fiveSecTimer -= 5;
        gameState.coffee += 5 * gameState.boostFiveSec;
      }
    }
    gameState.coffee = Math.floor(gameState.coffee);
    updateUI();
    requestAnimationFrame(gameTick);
  }

  // ---------- کلیک ----------
  function handleClick() {
    if (!currentUser) return;
    if (gameState.cooldownCurrent > 0) return;
    gameState.coffee += gameState.clickPower;
    gameState.cooldownCurrent = gameState.cooldownMax;
    updateUI();
    // انیمیشن
    const bean = document.createElement('div');
    bean.textContent = '☕';
    bean.style.cssText = 'position:fixed;font-size:22px;pointer-events:none;z-index:999;transition:all .8s ease-out;';
    const rect = coffeeBtn.getBoundingClientRect();
    bean.style.left = (rect.left + rect.width/2) + 'px';
    bean.style.top = (rect.top + rect.height/2) + 'px';
    document.body.appendChild(bean);
    requestAnimationFrame(() => {
      bean.style.transform = `translate(${Math.random()*60-30}px, -90px) rotate(180deg)`;
      bean.style.opacity = '0';
    });
    setTimeout(() => bean.remove(), 800);
  }

  // ---------- توانایی‌ها با افزایش قیمت ----------
  function buyBoostFive() {
    const price = gameState.priceBoost;
    if (gameState.coffee < price) return;
    gameState.coffee -= price;
    gameState.boostFiveSec++;
    // افزایش قیمت برای خرید بعدی (۵۰٪ افزایش)
    gameState.priceBoost = Math.floor(price * 1.5);
    updateUI();
    saveDatabase().catch(e => console.error('Save error:', e));
  }

  function buyClickPower() {
    const price = gameState.priceClick;
    if (gameState.coffee < price) return;
    gameState.coffee -= price;
    gameState.clickPower++;
    gameState.priceClick = Math.floor(price * 1.5);
    updateUI();
    saveDatabase().catch(e => console.error('Save error:', e));
  }

  function buyReduceCooldown() {
    const price = gameState.priceCooldown;
    if (gameState.coffee < price) return;
    if (gameState.cooldownMax <= 0.05) {
      alert('کول‌داون به حداقل رسیده!');
      return;
    }
    gameState.coffee -= price;
    gameState.cooldownMax = Math.max(0.05, gameState.cooldownMax - 0.05);
    gameState.priceCooldown = Math.floor(price * 1.5);
    if (gameState.cooldownCurrent > gameState.cooldownMax) {
      gameState.cooldownCurrent = gameState.cooldownMax;
    }
    updateUI();
    saveDatabase().catch(e => console.error('Save error:', e));
  }

  // ---------- ریست ----------
  function resetGame() {
    if (!currentUser) return;
    if (!confirm(`ریست بازی برای "${currentUser}"؟`)) return;
    gameState.coffee = 0;
    gameState.clickPower = 1;
    gameState.cooldownMax = COOLDOWN_SEC;
    gameState.cooldownCurrent = 0;
    gameState.boostFiveSec = 0;
    gameState.fiveSecTimer = 0;
    gameState.lastTick = Date.now();
    gameState.priceBoost = BASE_PRICE_BOOST;
    gameState.priceClick = BASE_PRICE_CLICK;
    gameState.priceCooldown = BASE_PRICE_COOLDOWN;
    saveDatabase().catch(e => console.error('Reset save error:', e));
    updateUI();
  }

  // ================================================================
  //  احراز هویت (فقط با Gist)
  // ================================================================

  function switchTab(m) {
    mode = m;
    document.getElementById('tab-login').classList.toggle('active', m === 'login');
    document.getElementById('tab-signup').classList.toggle('active', m === 'signup');
    document.getElementById('auth-submit-btn').textContent = m === 'login' ? 'ورود' : 'ثبت‌نام';
    document.getElementById('password').autocomplete = m === 'login' ? 'current-password' : 'new-password';
    showAuthError('');
  }

  function showAuthError(msg) {
    const el = document.getElementById('auth-error');
    if (!msg) { el.classList.remove('show'); el.textContent = ''; return; }
    el.textContent = msg; el.classList.add('show');
  }

  async function handleAuthSubmit(ev) {
    ev.preventDefault();
    if (!gistReady) {
      showAuthError('❌ اتصال به Gist برقرار نیست. لطفاً صفحه را refresh کنید یا بعداً تلاش کنید.');
      return;
    }
    showAuthError('');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!/^[a-zA-Z0-9_\u0600-\u06FF]{3,20}$/.test(username)) {
      showAuthError('نام کاربری ۳ تا ۲۰ کاراکتر'); return;
    }
    if (password.length < 4) { showAuthError('رمز حداقل ۴ کاراکتر'); return; }

    const btn = document.getElementById('auth-submit-btn');
    btn.disabled = true; btn.style.opacity = '.6';

    try {
      const hash = await sha256(password);
      await loadDatabase();

      if (mode === 'signup') {
        if (db.users[username]) { showAuthError('این نام قبلاً گرفته شده'); return; }
        db.users[username] = { hash, clicks: 0, boostCount: 0, clickPower: 1, cooldownMax: COOLDOWN_SEC, priceBoost: BASE_PRICE_BOOST, priceClick: BASE_PRICE_CLICK, priceCooldown: BASE_PRICE_COOLDOWN };
        await saveDatabase();
        startSession(username, 0);
      } else {
        const user = db.users[username];
        if (!user) { showAuthError('کاربری با این نام وجود ندارد'); return; }
        if (user.hash !== hash) { showAuthError('رمز عبور اشتباه است'); return; }
        startSession(username, user.clicks || 0);
      }
    } catch (err) {
      showAuthError('خطا: ' + err.message);
    } finally {
      btn.disabled = false; btn.style.opacity = '1';
    }
  }

  function startSession(username, clicks) {
    currentUser = username;
    isGuest = false;
    const userData = db.users[username] || {};
    gameState.coffee = clicks || 0;
    gameState.clickPower = userData.clickPower || 1;
    gameState.cooldownMax = userData.cooldownMax || COOLDOWN_SEC;
    gameState.cooldownCurrent = 0;
    gameState.boostFiveSec = userData.boostCount || 0;
    gameState.fiveSecTimer = 0;
    gameState.lastTick = Date.now();
    gameState.priceBoost = userData.priceBoost || BASE_PRICE_BOOST;
    gameState.priceClick = userData.priceClick || BASE_PRICE_CLICK;
    gameState.priceCooldown = userData.priceCooldown || BASE_PRICE_COOLDOWN;

    meName.textContent = username;
    guestBanner.classList.add('hidden');
    authCard.classList.add('hidden');
    convertCard.classList.add('hidden');
    app.classList.remove('hidden');

    updateUI();
    updateLeaderboard();

    startAutoSave();

    if (lbPoll) clearInterval(lbPoll);
    lbPoll = setInterval(updateLeaderboard, 5000);
  }

  // ---------- مهمان ----------
  function guestLogin() {
    if (!gistReady) {
      alert('❌ اتصال به Gist برقرار نیست. لطفاً صفحه را refresh کنید.');
      return;
    }
    const guestName = 'مهمان_' + Math.floor(1000 + Math.random() * 9000);
    currentUser = guestName;
    isGuest = true;

    gameState.coffee = 0;
    gameState.clickPower = 1;
    gameState.cooldownMax = COOLDOWN_SEC;
    gameState.cooldownCurrent = 0;
    gameState.boostFiveSec = 0;
    gameState.fiveSecTimer = 0;
    gameState.lastTick = Date.now();
    gameState.priceBoost = BASE_PRICE_BOOST;
    gameState.priceClick = BASE_PRICE_CLICK;
    gameState.priceCooldown = BASE_PRICE_COOLDOWN;

    meName.textContent = guestName;
    guestBanner.classList.remove('hidden');
    authCard.classList.add('hidden');
    convertCard.classList.add('hidden');
    app.classList.remove('hidden');

    updateUI();
    updateLeaderboard();
    myRankDiv.classList.add('hidden');

    if (lbPoll) clearInterval(lbPoll);
    lbPoll = setInterval(updateLeaderboard, 5000);
  }

  // ---------- تبدیل مهمان ----------
  function showConvert() {
    app.classList.add('hidden');
    convertCard.classList.remove('hidden');
    document.getElementById('conv-error').classList.remove('show');
  }
  function hideConvert() {
    convertCard.classList.add('hidden');
    app.classList.remove('hidden');
  }

  async function handleConvertSubmit() {
    if (!gistReady) {
      alert('❌ اتصال به Gist برقرار نیست');
      return;
    }
    const username = document.getElementById('conv-username').value.trim();
    const password = document.getElementById('conv-password').value;
    const errEl = document.getElementById('conv-error');
    errEl.classList.remove('show');

    if (!/^[a-zA-Z0-9_\u0600-\u06FF]{3,20}$/.test(username)) {
      errEl.textContent = 'نام کاربری ۳ تا ۲۰ کاراکتر'; errEl.classList.add('show'); return;
    }
    if (password.length < 4) {
      errEl.textContent = 'رمز حداقل ۴ کاراکتر'; errEl.classList.add('show'); return;
    }

    try {
      await loadDatabase();
      if (db.users[username]) {
        errEl.textContent = 'این نام قبلاً گرفته شده'; errEl.classList.add('show'); return;
      }
      const hash = await sha256(password);
      const currentClicks = gameState.coffee;
      db.users[username] = {
        hash,
        clicks: currentClicks,
        boostCount: gameState.boostFiveSec,
        clickPower: gameState.clickPower,
        cooldownMax: gameState.cooldownMax,
        priceBoost: gameState.priceBoost,
        priceClick: gameState.priceClick,
        priceCooldown: gameState.priceCooldown
      };
      await saveDatabase();
      convertCard.classList.add('hidden');
      startSession(username, currentClicks);
    } catch (err) {
      errEl.textContent = 'خطا: ' + err.message; errEl.classList.add('show');
    }
  }

  // ---------- خروج ----------
  function logout(skipSave) {
    stopAutoSave();
    if (lbPoll) clearInterval(lbPoll);
    if (currentUser && !isGuest && !skipSave) {
      saveDatabase().catch(e => console.error('Logout save error:', e));
    }
    currentUser = null;
    isGuest = false;
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    app.classList.add('hidden');
    authCard.classList.remove('hidden');
    myRankDiv.classList.add('hidden');
    closeAdminPanel();
  }

  // ================================================================
  //  پنل ادمین
  // ================================================================

  function openAdminPanel() {
    adminOverlay.classList.remove('hidden');
    adminPanelContainer.innerHTML = `
      <h2>🔐 پنل مدیریت</h2>
      <label for="adminPassInput">رمز عبور</label>
      <input type="password" id="adminPassInput" placeholder="رمز را وارد کنید" style="text-align:center;letter-spacing:4px;">
      <button class="primary" onclick="adminLogin()">ورود</button>
      <div class="error" id="adminLoginError"></div>
      <span class="back-link" onclick="closeAdminPanel()">بستن</span>
    `;
    document.getElementById('adminPassInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') adminLogin();
    });
    setTimeout(() => document.getElementById('adminPassInput').focus(), 100);
  }

  function closeAdminPanel() {
    adminOverlay.classList.add('hidden');
  }

  function adminLogin() {
    const pass = document.getElementById('adminPassInput').value;
    const errEl = document.getElementById('adminLoginError');
    if (pass !== ADMIN_PASSWORD) {
      errEl.textContent = 'رمز اشتباه است';
      errEl.classList.add('show');
      return;
    }
    errEl.classList.remove('show');
    renderAdminPanel();
  }

  async function renderAdminPanel() {
    await loadDatabase();
    const users = db.users || {};
    const names = Object.keys(users).sort((a, b) => (users[b].clicks || 0) - (users[a].clicks || 0));

    let html = `
      <h2>
        <span>👑 مدیریت Gist</span>
        <button onclick="closeAdminPanel()">✕</button>
      </h2>
      <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-secondary" style="margin:0;flex:1;" onclick="adminRefresh()">🔄 بازخوانی</button>
        <button class="btn-secondary" style="margin:0;flex:1;border-color:#d17a5e;color:#d17a5e;" onclick="adminResetAll()">🗑️ ریست همه</button>
      </div>
    `;

    if (names.length === 0) {
      html += `<div class="empty">هیچ کاربری در دیتابیس وجود ندارد</div>`;
    } else {
      html += `<div style="max-height:400px;overflow-y:auto;">`;
      for (let name of names) {
        const clicks = users[name].clicks || 0;
        html += `
          <div class="admin-user-row" data-name="${escapeHtml(name)}">
            <span class="uname">${escapeHtml(name)}</span>
            <input type="number" min="0" value="${clicks}" id="admin-input-${escapeHtml(name)}">
            <button class="btn-save" onclick="adminSaveUser('${escapeHtml(name)}')">ذخیره</button>
            <button class="btn-del" onclick="adminDeleteUser('${escapeHtml(name)}')">حذف</button>
          </div>
        `;
      }
      html += `</div>`;
    }

    html += `<span class="back-link" onclick="closeAdminPanel()">بستن پنل</span>`;
    adminPanelContainer.innerHTML = html;
  }

  window.adminRefresh = async function() {
    await loadDatabase();
    renderAdminPanel();
  };

  window.adminSaveUser = async function(name) {
    const input = document.getElementById('admin-input-' + name);
    if (!input) return;
    const val = Math.max(0, parseInt(input.value, 10) || 0);

    let fresh;
    try { fresh = await loadFromGist(); } catch (e) { fresh = db; }
    if (!fresh.users || !fresh.users[name]) { db = fresh; renderAdminPanel(); return; }
    fresh.users[name].clicks = val;
    db = fresh;
    await saveToGist(db);

    if (name === currentUser && !isGuest) {
      gameState.coffee = val;
      updateUI();
    }
    renderAdminPanel();
    updateLeaderboard();
  };

  window.adminDeleteUser = async function(name) {
    if (!confirm(`آیا کاربر «${name}» حذف شود؟`)) return;

    let fresh;
    try { fresh = await loadFromGist(); } catch (e) { fresh = db; }
    if (fresh.users) delete fresh.users[name];
    db = fresh;
    await saveToGist(db);

    if (name === currentUser && !isGuest) {
      // skip the save inside logout() - it would otherwise recreate the
      // account we just deleted, since saveDatabase() creates a user
      // entry if one doesn't exist for the current session
      logout(true);
    } else {
      renderAdminPanel();
      updateLeaderboard();
    }
  };

  window.adminResetAll = async function() {
    if (!confirm('همه امتیازها صفر شوند؟')) return;

    let fresh;
    try { fresh = await loadFromGist(); } catch (e) { fresh = db; }
    for (let name in fresh.users) {
      fresh.users[name].clicks = 0;
      fresh.users[name].boostCount = 0;
      fresh.users[name].clickPower = 1;
      fresh.users[name].cooldownMax = COOLDOWN_SEC;
      fresh.users[name].priceBoost = BASE_PRICE_BOOST;
      fresh.users[name].priceClick = BASE_PRICE_CLICK;
      fresh.users[name].priceCooldown = BASE_PRICE_COOLDOWN;
    }
    db = fresh;
    await saveToGist(db);

    if (currentUser && !isGuest && db.users[currentUser]) {
      gameState.coffee = 0;
      gameState.clickPower = 1;
      gameState.cooldownMax = COOLDOWN_SEC;
      gameState.cooldownCurrent = 0;
      gameState.boostFiveSec = 0;
      gameState.priceBoost = BASE_PRICE_BOOST;
      gameState.priceClick = BASE_PRICE_CLICK;
      gameState.priceCooldown = BASE_PRICE_COOLDOWN;
      updateUI();
    }
    renderAdminPanel();
    updateLeaderboard();
  };

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ================================================================
  //  مقداردهی اولیه
  // ================================================================
  async function init() {
    await autoConnectGist();

    authCard.classList.remove('hidden');
    app.classList.add('hidden');
    convertCard.classList.add('hidden');

    coffeeBtn.addEventListener('click', handleClick);
    document.getElementById('auth-form').addEventListener('submit', handleAuthSubmit);
    document.getElementById('username').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('auth-form').dispatchEvent(new Event('submit'));
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('auth-form').dispatchEvent(new Event('submit'));
    });

    boostFiveBtn.addEventListener('click', buyBoostFive);
    boostClickBtn.addEventListener('click', buyClickPower);
    reduceCooldownBtn.addEventListener('click', buyReduceCooldown);
    resetBtn.addEventListener('click', resetGame);

    gameState.lastTick = Date.now();
    requestAnimationFrame(gameTick);

    lbList.innerHTML = '<div class="lb-item" style="justify-content:center;">در حال بارگذاری...</div>';
  }

  // توابع عمومی
  window.switchTab = switchTab;
  window.handleAuthSubmit = handleAuthSubmit;
  window.guestLogin = guestLogin;
  window.showConvert = showConvert;
  window.hideConvert = hideConvert;
  window.handleConvertSubmit = handleConvertSubmit;
  window.logout = logout;
  window.buyBoostFive = buyBoostFive;
  window.buyClickPower = buyClickPower;
  window.buyReduceCooldown = buyReduceCooldown;
  window.resetGame = resetGame;
  window.openAdminPanel = openAdminPanel;
  window.closeAdminPanel = closeAdminPanel;
  window.adminLogin = adminLogin;

  init();
</script>
</body>
</html>
